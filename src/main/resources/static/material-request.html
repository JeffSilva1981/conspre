<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Requisição de Material</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background:#f4f6f9; }
        .navbar { background:#1e3a8a; }

        .box {
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark px-3">
    <span class="navbar-brand">🔄 Nova Requisição</span>
</nav>

<div class="container mt-4">

    <h3 class="mb-3">Nova Requisição</h3>

    <div id="alerta" class="alert d-none"></div>

    <div class="box">

        <!-- FUNCIONÁRIO -->
        <div class="mb-3">
            <label>Funcionário</label>
            <input list="funcionarios" id="employeeInput" class="form-control"
                   placeholder="Digite para buscar funcionário">
            <datalist id="funcionarios"></datalist>
        </div>

        <div class="row g-2">
            <div class="col-md-5">
                <label>Material</label>
                <input list="materiais" id="materialInput" class="form-control"
                       placeholder="Digite para buscar material">
                <datalist id="materiais"></datalist>
            </div>

            <div class="col-md-3">
                <label>Quantidade</label>
                <input id="quantity" type="number" class="form-control">
            </div>

            <div class="col-md-4">
                <label>Observação</label>
                <input id="observation" class="form-control">
            </div>
        </div>

        <button class="btn btn-success mt-3" onclick="adicionarItem()">+ Adicionar Item</button>

        <table class="table mt-3">
            <thead>
            <tr>
                <th>Material</th>
                <th>Quantidade</th>
                <th>Ação</th>
            </tr>
            </thead>
            <tbody id="itensTabela"></tbody>
        </table>

        <button class="btn btn-primary w-100" onclick="finalizar()">Finalizar Requisição</button>

    </div>

</div>

<script>

    const API = "http://localhost:8080";
    const token = localStorage.getItem("token");

    let itens = [];
    let listaMateriais = [];
    let listaFuncionarios = [];

    const materialInput = document.getElementById("materialInput");
    const employeeInput = document.getElementById("employeeInput");

    const datalistMateriais = document.getElementById("materiais");
    const datalistFuncionarios = document.getElementById("funcionarios");

    const quantityInput = document.getElementById("quantity");
    const observationInput = document.getElementById("observation");
    const itensTabela = document.getElementById("itensTabela");
    const alerta = document.getElementById("alerta");

    if (!token){
        window.location.href = "login.html";
    }

    carregarMateriais();
    carregarFuncionarios();

    function mostrarMensagem(msg, tipo){
        alerta.className = `alert alert-${tipo}`;
        alerta.innerText = msg;
        alerta.classList.remove("d-none");

        setTimeout(() => {
            alerta.classList.add("d-none");
        }, 3000);
    }

    async function carregarMateriais(){
        const res = await fetch(API + "/materials", {
            headers: { "Authorization": "Bearer " + token }
        });

        const data = await res.json();
        listaMateriais = data.content || data;

        datalistMateriais.innerHTML = listaMateriais.map(m =>
            `<option value="${m.name}">`
        ).join("");
    }

    async function carregarFuncionarios(){
        const res = await fetch(API + "/employees", {
            headers: { "Authorization": "Bearer " + token }
        });

        const data = await res.json();
        listaFuncionarios = data.content || data;

        datalistFuncionarios.innerHTML = listaFuncionarios.map(e =>
            `<option value="${e.name}">`
        ).join("");
    }

    function adicionarItem(){

        const nomeDigitado = materialInput.value.trim();
        const material = listaMateriais.find(m => m.name === nomeDigitado);
        const qtd = quantityInput.value;

        if (!material){
            mostrarMensagem("Selecione um material válido", "danger");
            return;
        }

        if (!qtd || qtd <= 0){
            mostrarMensagem("Informe uma quantidade válida", "danger");
            return;
        }

        // 🔥 EVITA DUPLICADO
        if (itens.some(i => i.materialId === material.id)){
            mostrarMensagem("Material já adicionado", "warning");
            return;
        }

        itens.push({
            materialId: material.id,
            nome: material.name,
            quantity: qtd
        });

        materialInput.value = "";
        quantityInput.value = "";

        renderizarItens();
    }

    function renderizarItens(){

        itensTabela.innerHTML = "";

        itens.forEach((item, i) => {
            itensTabela.innerHTML += `
                <tr>
                    <td>${item.nome}</td>
                    <td>${item.quantity}</td>
                    <td>
                        <button class="btn btn-danger btn-sm" onclick="removerItem(${i})">Remover</button>
                    </td>
                </tr>
            `;
        });
    }

    function removerItem(index){
        itens.splice(index,1);
        renderizarItens();
    }

    async function finalizar(){

        const nomeFuncionario = employeeInput.value.trim();
        const funcionario = listaFuncionarios.find(e => e.name === nomeFuncionario);

        if (!funcionario){
            mostrarMensagem("Selecione um funcionário válido", "danger");
            return;
        }

        if (itens.length === 0){
            mostrarMensagem("Adicione pelo menos um item", "danger");
            return;
        }

        const body = {
            employeeId: funcionario.id,
            userId: 1,
            observation: observationInput.value,
            items: itens.map(i => ({
                materialId: parseInt(i.materialId),
                quantity: parseFloat(i.quantity)
            }))
        };

        const res = await fetch(API + "/material-requests", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify(body)
        });

        if (res.ok){
            mostrarMensagem("Requisição criada com sucesso!", "success");

            itens = [];
            renderizarItens();

            employeeInput.value = "";
            observationInput.value = "";
        } else {
            mostrarMensagem("Erro ao criar requisição", "danger");
        }
    }

</script>

</body>
</html>
