<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Consulta de Requisições</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background:#f4f6f9; }
        .navbar { background:#1e3a8a; }

        .box {
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .loading {
            text-align:center;
            padding:20px;
            font-weight:bold;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark px-3">
    <span class="navbar-brand">📋 Consulta de Requisições</span>
</nav>

<div class="container mt-4">

    <h3 class="mb-3">Requisições</h3>

    <div class="box">
        <div id="loading" class="loading d-none">Carregando...</div>

        <table class="table table-hover">
            <thead>
            <tr>
                <th>ID Requisição</th>
                <th>Funcionário</th>
                <th>Data</th>
                <th>Ações</th>
            </tr>
            </thead>
            <tbody id="tabela"></tbody>
        </table>
    </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="modalItens">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5>Itens da Requisição</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="itensModal"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const API = "http://localhost:8080";
    const token = localStorage.getItem("token");

    let dadosAgrupados = {};

    const tabela = document.getElementById("tabela");
    const loading = document.getElementById("loading");

    let modalItens = new bootstrap.Modal(document.getElementById("modalItens"));

    if (!token) window.location.href = "login.html";

    listar();

    function mostrarLoading(){ loading.classList.remove("d-none"); }
    function esconderLoading(){ loading.classList.add("d-none"); }

    async function listar(){
        mostrarLoading();

        try {
            const res = await fetch(API + "/stock-movements/requests", {
                headers: { Authorization: "Bearer " + token }
            });

            const data = await res.json();

            agrupar(data.content);
            renderizar();

        } catch (err){
            console.error(err);
        } finally {
            esconderLoading();
        }
    }

    // 🔥 AGRUPAMENTO CORRETO
    function agrupar(lista){
        dadosAgrupados = {};

        lista.forEach(item => {

            const reqId = item.materialRequestId;

            if (!dadosAgrupados[reqId]) {
                dadosAgrupados[reqId] = {
                    id: reqId,
                    employeeName: item.employeeName,
                    moment: item.moment,
                    itens: []
                };
            }

            dadosAgrupados[reqId].itens.push(item);
        });
    }

    function renderizar(){
        tabela.innerHTML = "";

        const lista = Object.values(dadosAgrupados);

        if (lista.length === 0){
            tabela.innerHTML = `<tr><td colspan="4">Nenhum dado</td></tr>`;
            return;
        }

        lista.forEach(r => {

            const dataFormatada = new Date(r.moment).toLocaleString("pt-BR");

            tabela.innerHTML += `
                <tr>
                    <td>${r.id}</td>
                    <td>${r.employeeName}</td>
                    <td>${dataFormatada}</td>
                    <td>
                        <button class="btn btn-info btn-sm" onclick="verItens(${r.id})">
                            Ver Itens
                        </button>
                    </td>
                </tr>
            `;
        });
    }

    function verItens(id){

        const div = document.getElementById("itensModal");
        const req = dadosAgrupados[id];

        if (!req || req.itens.length === 0){
            div.innerHTML = "Sem itens";
        } else {

            div.innerHTML = `
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>Material</th>
                            <th>Quantidade</th>
                            <th>Tipo</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${req.itens.map(i => `
                            <tr>
                                <td>${i.materialName}</td>
                                <td>${i.quantity}</td>
                                <td>${i.type}</td>
                            </tr>
                        `).join("")}
                    </tbody>
                </table>
            `;
        }

        modalItens.show();
    }
</script>

</body>
</html>
