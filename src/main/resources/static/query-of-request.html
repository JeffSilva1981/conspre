<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Consulta de Requisições</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background:#f4f6f9; }
        .navbar { background:#1e3a8a; }

        .box {
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .loading {
            text-align:center;
            padding:20px;
            font-weight:bold;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark px-3">
    <span class="navbar-brand">📋 Consulta de Requisições</span>
</nav>

<div class="container mt-4">

    <h3 class="mb-3">Requisições</h3>

    <!-- FILTROS -->
    <div class="box mb-3">
        <div class="row g-2">

            <div class="col-md-4">
                <label>Funcionário</label>
                <input list="funcionarios" id="filtroEmployee" class="form-control" placeholder="Digite para buscar">
                <datalist id="funcionarios"></datalist>
            </div>

            <div class="col-md-3">
                <label>Data Inicial</label>
                <input id="dataInicio" type="date" class="form-control">
            </div>

            <div class="col-md-3">
                <label>Data Final</label>
                <input id="dataFim" type="date" class="form-control">
            </div>

            <div class="col-md-2 d-flex align-items-end">
                <button class="btn btn-primary w-100" onclick="buscar()">Buscar</button>
            </div>

        </div>
    </div>

    <!-- TABELA -->
    <div class="box">

        <div id="loading" class="loading d-none">Carregando...</div>

        <table class="table table-hover">
            <thead>
            <tr>
                <th>ID</th>
                <th>Funcionário</th>
                <th>Data</th>
                <th>Ações</th>
            </tr>
            </thead>
            <tbody id="tabela"></tbody>
        </table>

        <div class="d-flex justify-content-between">
            <button class="btn btn-secondary" onclick="paginaAnterior()">⬅</button>
            <span id="paginaInfo"></span>
            <button class="btn btn-secondary" onclick="proximaPagina()">➡</button>
        </div>

    </div>

</div>

<!-- MODAL ITENS -->
<div class="modal fade" id="modalItens">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5>Itens da Requisição</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="itensModal"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const API = "http://localhost:8080";
    const token = localStorage.getItem("token");

    let listaFuncionarios = [];
    let pagina = 0;
    let totalPaginas = 0;

    const tabela = document.getElementById("tabela");
    const paginaInfo = document.getElementById("paginaInfo");
    const loading = document.getElementById("loading");

    const filtroEmployee = document.getElementById("filtroEmployee");
    const dataInicio = document.getElementById("dataInicio");
    const dataFim = document.getElementById("dataFim");

    const datalistFuncionarios = document.getElementById("funcionarios");

    let modalItens = new bootstrap.Modal(document.getElementById("modalItens"));

    if (!token){
        window.location.href = "login.html";
    }

    carregarFuncionarios();
    listar();

    function mostrarLoading(){ loading.classList.remove("d-none"); }
    function esconderLoading(){ loading.classList.add("d-none"); }

    async function carregarFuncionarios(){
        const res = await fetch(API + "/employees", {
            headers: { Authorization: "Bearer " + token }
        });

        const data = await res.json();
        listaFuncionarios = data.content || data;

        datalistFuncionarios.innerHTML = listaFuncionarios.map(e =>
            `<option value="${e.name}">`
        ).join("");
    }

    function montarUrl(){
        let url = API + `/stock-movements/requests?page=${pagina}&size=10`;
        const params = [];

        const funcionario = listaFuncionarios.find(e => e.name === filtroEmployee.value);

        if (funcionario) params.push("userId=" + funcionario.id); // backend usa userId
        if (dataInicio.value) params.push("dateMin=" + dataInicio.value);
        if (dataFim.value) params.push("dateMax=" + dataFim.value);

        if (params.length > 0){
            url += "&" + params.join("&");
        }

        return url;
    }

    async function listar(){
        mostrarLoading();

        try {
            const res = await fetch(montarUrl(), {
                headers: { Authorization: "Bearer " + token }
            });

            const data = await res.json();

            totalPaginas = data.totalPages || 1;
            renderizar(data.content || data);
            paginaInfo.innerText = `Página ${pagina+1} de ${totalPaginas}`;
        } catch (err){
            console.error(err);
            tabela.innerHTML = `<tr><td colspan="4" class="text-center">Erro ao carregar requisições</td></tr>`;
        } finally {
            esconderLoading();
        }
    }

    function buscar(){
        pagina = 0;
        listar();
    }

    function paginaAnterior(){
        if (pagina > 0){
            pagina--;
            listar();
        }
    }

    function proximaPagina(){
        if (pagina < totalPaginas - 1){
            pagina++;
            listar();
        }
    }

    function renderizar(lista){
        tabela.innerHTML = "";

        if (!lista || lista.length === 0){
            tabela.innerHTML = `<tr><td colspan="4" class="text-center">Nenhuma requisição</td></tr>`;
            return;
        }

        lista.forEach(r => {
            const funcionario = r.userName || "-";
            const dataFormatada = r.moment ? new Date(r.moment).toLocaleString("pt-BR") : "-";
            const itens = r.items || [];

            tabela.innerHTML += `
                <tr>
                    <td>${r.id}</td>
                    <td>${funcionario}</td>
                    <td>${dataFormatada}</td>
                    <td>
                        <button class="btn btn-info btn-sm" onclick='verItens(${JSON.stringify(itens)})'>
                            Ver Itens
                        </button>
                    </td>
                </tr>
            `;
        });
    }

    function verItens(itens){
        const div = document.getElementById("itensModal");

        if (!itens || itens.length === 0){
            div.innerHTML = "Sem itens";
        } else {
            div.innerHTML = `
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>Material</th>
                            <th>Quantidade</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${itens.map(i => `
                            <tr>
                                <td>${i.materialName}</td>
                                <td>${i.quantity}</td>
                            </tr>
                        `).join("")}
                    </tbody>
                </table>
            `;
        }

        modalItens.show();
    }

</script>

</body>
</html>
