<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Funcionários</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background:#f4f6f9; }
        .navbar { background:#1e3a8a; }

        .box {
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .status-ativo { color:green; font-weight:bold; }
        .status-inativo { color:red; font-weight:bold; }
    </style>
</head>

<body>

<nav class="navbar navbar-dark px-3">
    <span class="navbar-brand">👷 Funcionários</span>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-3">
        <h3>Lista de Funcionários</h3>
    </div>

    <!-- FILTROS -->
    <div class="box mb-3">
        <div class="row g-2">

            <div class="col-md-4">
                <input id="filtroNome" class="form-control" placeholder="Buscar por nome">
            </div>

            <div class="col-md-3">
                <select id="filtroAtivo" class="form-control">
                    <option value="">Todos</option>
                    <option value="true">Ativo</option>
                    <option value="false">Inativo</option>
                </select>
            </div>

            <div class="col-md-3">
                <button class="btn btn-primary w-100" onclick="buscar()">Buscar</button>
            </div>

            <div class="col-md-2">
                <button class="btn btn-success w-100" onclick="abrirModalNovo()">+ Novo</button>
            </div>

        </div>
    </div>

    <!-- TABELA -->
    <div class="box">

        <table class="table table-hover">
            <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Registro</th>
                <th>Status</th>
                <th>Ações</th>
            </tr>
            </thead>
            <tbody id="tabela"></tbody>
        </table>

        <div class="d-flex justify-content-between align-items-center mt-3">
            <button class="btn btn-secondary" onclick="paginaAnterior()">⬅ Anterior</button>
            <span id="infoPagina"></span>
            <button class="btn btn-secondary" onclick="proximaPagina()">Próxima ➡</button>
        </div>

    </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="modal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Funcionário</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input type="hidden" id="inputId">

                <div class="mb-2">
                    <label>Nome</label>
                    <input id="inputName" class="form-control">
                </div>

                <div class="mb-2">
                    <label>Registro</label>
                    <input id="inputRegistration" class="form-control">
                </div>

                <div class="form-check">
                    <input type="checkbox" id="inputAtivo" class="form-check-input">
                    <label class="form-check-label">Ativo</label>
                </div>

            </div>

            <div class="modal-footer">
                <button class="btn btn-primary" onclick="salvar()">Salvar</button>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

    const API = "http://localhost:8080";
    const token = localStorage.getItem("token");

    const tabela = document.getElementById("tabela");
    const infoPagina = document.getElementById("infoPagina");

    const inputId = document.getElementById("inputId");
    const inputName = document.getElementById("inputName");
    const inputRegistration = document.getElementById("inputRegistration");
    const inputAtivo = document.getElementById("inputAtivo");

    let modal = new bootstrap.Modal(document.getElementById("modal"));

    let pagina = 0;
    let totalPaginas = 0;

    let listaCompleta = [];

    if (!token){
        window.location.href = "login.html";
    }

    listar();

    function montarUrl(){
        let url = API + "/employees?page=" + pagina + "&size=50";

        const nome = document.getElementById("filtroNome").value;

        if (nome) url += "&name=" + nome;

        return url;
    }

    async function listar(){

        const res = await fetch(montarUrl(), {
            headers: { "Authorization": "Bearer " + token }
        });

        const data = await res.json();

        listaCompleta = data.content;

        aplicarFiltro();
    }

    function buscar(){
        pagina = 0;
        listar();
    }

    function aplicarFiltro(){

        const ativoFiltro = document.getElementById("filtroAtivo").value;

        let lista = [...listaCompleta];

        if (ativoFiltro !== ""){
            lista = lista.filter(e => String(e.ativo) === ativoFiltro);
        }

        renderizar(lista);

        infoPagina.innerText = `Mostrando ${lista.length} registros`;
    }

    function renderizar(lista){

        tabela.innerHTML = "";

        lista.forEach(e => {

            const status = e.ativo ?
                `<span class="status-ativo">Ativo</span>` :
                `<span class="status-inativo">Inativo</span>`;

            tabela.innerHTML += `
                <tr>
                    <td>${e.id}</td>
                    <td>${e.name}</td>
                    <td>${e.registration}</td>
                    <td>${status}</td>
                    <td>
                        <button class="btn btn-warning btn-sm" onclick="editar(${e.id})">Editar</button>
                        <button class="btn btn-danger btn-sm" onclick="deletar(${e.id})">Deletar</button>
                    </td>
                </tr>
            `;
        });
    }

    function abrirModalNovo(){
        inputId.value = "";
        inputName.value = "";
        inputRegistration.value = "";
        inputAtivo.checked = true;
        modal.show();
    }

    async function editar(idParam){

        const res = await fetch(API + "/employees/" + idParam, {
            headers: { "Authorization": "Bearer " + token }
        });

        const e = await res.json();

        inputId.value = e.id;
        inputName.value = e.name;
        inputRegistration.value = e.registration;
        inputAtivo.checked = e.ativo;

        modal.show();
    }

    async function salvar(){

        const body = {
            name: inputName.value,
            registration: inputRegistration.value,
            ativo: inputAtivo.checked
        };

        let url = API + "/employees";
        let method = "POST";

        if (inputId.value){
            url += "/" + inputId.value;
            method = "PUT";
        }

        const res = await fetch(url, {
            method: method,
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify(body)
        });

        if (res.ok){
            modal.hide();
            listar();
        } else {
            alert("Erro ao salvar");
        }
    }

    async function deletar(id){

        if (!confirm("Deseja realmente deletar?")) return;

        await fetch(API + "/employees/" + id, {
            method: "DELETE",
            headers: { "Authorization": "Bearer " + token }
        });

        listar();
    }

</script>

</body>
</html>
