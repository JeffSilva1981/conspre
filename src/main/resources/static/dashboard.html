<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">Sistema de Estoque</h2>

    <div class="row">

        <div class="col-md-4">
            <button class="btn btn-primary w-100 p-4" onclick="go('materials.html')">
                📦 Materiais
            </button>
        </div>

        <div class="col-md-4">
            <button class="btn btn-success w-100 p-4" onclick="go('stock.html')">
                📊 Estoque
            </button>
        </div>

        <div class="col-md-4">
            <button class="btn btn-dark w-100 p-4" onclick="go('requests.html')">
                📋 Requisições
            </button>
        </div>

    </div>

</div>

<script>
    function go(page) {
        window.location.href = page;
    }
</script>

</body>
</html>
