<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Material</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background:#f4f6f9; }

        .box {
            max-width:600px;
            margin:50px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .categoria-box {
            max-height:150px;
            overflow-y:auto;
            border:1px solid #ddd;
            padding:10px;
            border-radius:5px;
        }
    </style>
</head>

<body>

<div class="box">

    <h3 id="titulo">Novo Material</h3>

    <div class="mb-3">
        <label>Nome</label>
        <input id="name" class="form-control">
    </div>

    <div class="mb-3">
        <label>Unidade</label>
        <select id="unit" class="form-control">
            <option value="UN">UN</option>
            <option value="KG">KG</option>
            <option value="L">L</option>
        </select>
    </div>

    <div class="mb-3">
        <label>Estoque</label>
        <input id="currentStock" type="number" class="form-control">
    </div>

    <div class="mb-3">
        <label>Mínimo</label>
        <input id="minimumStock" type="number" class="form-control">
    </div>

    <!-- ✅ NOVO FORMATO DE CATEGORIAS -->
    <div class="mb-3">
        <label>Categorias</label>
        <div id="categoriasContainer" class="categoria-box"></div>
    </div>

    <div class="form-check mb-3">
        <input type="checkbox" id="ativo" class="form-check-input" checked>
        <label>Ativo</label>
    </div>

    <button class="btn btn-success w-100" onclick="salvar()">Salvar</button>
    <button class="btn btn-secondary w-100 mt-2" onclick="voltar()">Voltar</button>

</div>

<script>

    const API = "http://localhost:8080";
    const token = localStorage.getItem("token");

    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get("id");

    const categoriasContainer = document.getElementById("categoriasContainer");

    if (!token){
        alert("Sessão expirada");
        window.location.replace("login.html");
    }

    let categorias = [];

    // INIT
    carregarCategorias().then(() => {
        if (id){
            document.getElementById("titulo").innerText = "Editar Material";
            carregarMaterial();
        }
    });

    // ✅ CARREGAR CATEGORIAS COMO CHECKBOX
    async function carregarCategorias(){

        const res = await fetch(API + "/categories", {
            headers: { "Authorization": "Bearer " + token }
        });

        const data = await res.json();
        categorias = data.content || data;

        categoriasContainer.innerHTML = categorias.map(c => `
            <div class="form-check">
                <input class="form-check-input categoria-checkbox" type="checkbox" value="${c.id}" id="cat-${c.id}">
                <label class="form-check-label" for="cat-${c.id}">
                    ${c.name}
                </label>
            </div>
        `).join("");
    }

    // 🔍 CARREGAR MATERIAL
    async function carregarMaterial(){

        const res = await fetch(API + "/materials/" + id, {
            headers: { "Authorization": "Bearer " + token }
        });

        const m = await res.json();

        document.getElementById("name").value = m.name;
        document.getElementById("unit").value = m.unitOfMeasure;
        document.getElementById("currentStock").value = m.currentStock;
        document.getElementById("minimumStock").value = m.minimumStock;
        document.getElementById("ativo").checked = m.ativo;

        // ✅ MARCAR CHECKBOXES
        if (m.categories){
            const ids = m.categories.map(c => c.id);

            document.querySelectorAll(".categoria-checkbox").forEach(cb => {
                if (ids.includes(Number(cb.value))){
                    cb.checked = true;
                }
            });
        }
    }

    // 💾 SALVAR
    async function salvar(){

        const selecionadas = Array.from(document.querySelectorAll(".categoria-checkbox:checked"));

        const categories = selecionadas.map(cb => ({
            id: Number(cb.value)
        }));

        const body = {
            name: document.getElementById("name").value,
            unitOfMeasure: document.getElementById("unit").value,
            currentStock: Number(document.getElementById("currentStock").value),
            minimumStock: Number(document.getElementById("minimumStock").value),
            ativo: document.getElementById("ativo").checked,
            categories: categories
        };

        let method = "POST";
        let url = API + "/materials";

        if (id){
            method = "PUT";
            url = API + "/materials/" + id;
        }

        const res = await fetch(url, {
            method: method,
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify(body)
        });

        if (res.ok){
            alert("Salvo com sucesso!");
            window.location.replace("materials.html");
        } else {
            const erro = await res.text();
            console.error(erro);
            alert("Erro ao salvar");
        }
    }

    function voltar(){
        window.location.replace("materials.html");
    }

</script>

</body>
</html>
